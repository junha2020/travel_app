# Spring Application Name
spring.application.name=demo

# MariaDB Setting
spring.datasource.url = jdbc:mariadb://localhost:3306/travel_app?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true&enabledGSSAPI=false
spring.datasource.username = test
spring.datasource.password = test
spring.datasource.driver-class-name = org.mariadb.jdbc.Driver

# JPA/Hibernate Setting
spring.jpa.hibernate.ddl-auto = update
spring.jpa.show-sql = true
spring.jpa.properties.hibernate.format_sql = true
# MariaDB Dialect (use Hibernate 6+)
spring.jpa.properties.hibernate.dialect = org.hibernate.dialect.MariaDBDialect

# JWT Config
jwt.secret=${JWT_SECRET_KEY:c125f8a7a0b307463984e9345b0dfbcf4747b58b22191766b9977e2987d2d3b7}
jwt.expiration=86400000

# Hibernate ddl-auto
spring.jpa.defer-datasource-initialization=true

# SQL Error Firewall
spring.sql.init.continue-on-error=true